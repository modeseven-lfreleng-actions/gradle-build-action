---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2023 The Linux Foundation

name: "gradle-build"
description: "Set up a specific JDK version and run a Gradle build"

inputs:
  # JDK / toolchain
  java-version:
    # yamllint disable-line rule:line-length
    description: "OpenJDK version (ignored when 'java-version-file' is set). Defaults to 21 (LTS)"
    required: false
    default: "21"
  jdk-version:
    # yamllint disable-line rule:line-length
    description: "Deprecated alias for java-version; retained for backward compatibility"
    required: false
    default: ""
  distribution:
    description: "OpenJDK distribution"
    # yamllint disable-line rule:line-length
    # See: https://github.com/actions/setup-java?tab=readme-ov-file#supported-distributions
    required: false
    default: "temurin"
  java-version-file:
    # yamllint disable-line rule:line-length
    description: "Path to a '.java-version' file (takes precedence over java-version)"
    required: false
  java-package:
    description: "JDK package type: 'jdk', 'jre', 'jdk+fx', or 'jre+fx'"
    required: false
    default: "jdk"
  architecture:
    # yamllint disable-line rule:line-length
    description: "Architecture of the JDK package (defaults to the runner's architecture)"
    required: false
  check-latest:
    # yamllint disable-line rule:line-length
    description: "When 'true', resolve the latest version satisfying the version spec"
    required: false
    default: "false"
  setup-java-token:
    # yamllint disable-line rule:line-length
    description: "Token used by setup-java when fetching version manifests (useful on GHES or under rate limits)"
    required: false

  # Project / build configuration
  path:
    description: "Path to the Gradle project (directory containing gradlew)"
    required: false
    default: "."
  build-arguments:
    description: "Arguments to pass to the Gradle Wrapper (default: build)"
    required: false
    default: "build"
  gradle-version:
    # yamllint disable-line rule:line-length
    description: "Gradle version to use. If unset the project's Gradle Wrapper is used"
    required: false

  # Artefact upload
  artifact-upload:
    description: "Upload Gradle test reports as a workflow artefact"
    required: false
    default: "true"
  artifact-name:
    # yamllint disable-line rule:line-length
    description: "Name for the uploaded artefact (defaults to gradle-build-<job>)"
    required: false
    default: ""

  # Cache configuration (passed through to setup-gradle)
  cache-provider:
    # yamllint disable-line rule:line-length
    description: "Caching implementation: 'enhanced' (default) or 'basic' (MIT)"
    required: false
    default: "enhanced"
  cache-disabled:
    description: "When 'true', all caching is disabled"
    required: false
    default: "false"
  cache-read-only:
    # yamllint disable-line rule:line-length
    description: "When 'true', restore cache entries but do not write new ones"
    required: false
    default: "false"
  cache-write-only:
    # yamllint disable-line rule:line-length
    description: "When 'true', save cache entries but do not restore them"
    required: false
    default: "false"
  cache-encryption-key:
    # yamllint disable-line rule:line-length
    description: "Base64 AES key used to encrypt configuration-cache data"
    required: false
  cache-cleanup:
    # yamllint disable-line rule:line-length
    description: "Gradle User Home cleanup: 'never', 'on-success' (default) or 'always'"
    required: false
    default: "on-success"

  # Wrapper validation
  validate-wrappers:
    # yamllint disable-line rule:line-length
    description: "When 'true' (default) validate checksums of all gradlew jars"
    required: false
    default: "true"

  # Job summaries / PR comments
  add-job-summary:
    # yamllint disable-line rule:line-length
    description: "Emit a Job Summary: 'never', 'always' (default), or 'on-failure'"
    required: false
    default: "always"
  add-job-summary-as-pr-comment:
    # yamllint disable-line rule:line-length
    description: "Post Job Summary as PR comment: 'never' (default), 'always', 'on-failure'"
    required: false
    default: "never"

  # Dependency graph
  dependency-graph:
    # yamllint disable-line rule:line-length
    description: "Dependency snapshot mode: 'disabled' (default), 'generate', 'generate-and-submit', 'generate-submit-and-upload', 'generate-and-upload', 'download-and-submit'"
    required: false
    default: "disabled"

  # Build Scan / Develocity
  build-scan-publish:
    # yamllint disable-line rule:line-length
    description: "Publish results as a Build Scan on scans.gradle.com"
    required: false
    default: "false"
  build-scan-terms-of-use-url:
    description: "Build Scan terms of use URL (required if publishing)"
    required: false
  build-scan-terms-of-use-agree:
    # yamllint disable-line rule:line-length
    description: "Set to 'yes' to agree to the Build Scan terms of use"
    required: false
  develocity-url:
    description: "URL of a Develocity server (enables injection)"
    required: false
  develocity-access-key:
    # yamllint disable-line rule:line-length
    description: "Develocity access key (pass via secrets)"
    required: false

outputs:
  build-scan-url:
    description: "Link to the Build Scan generated by the Gradle build"
    value: "${{ steps.setup-gradle.outputs.build-scan-url }}"
  gradle-version:
    description: "Version of Gradle set up by the action"
    value: "${{ steps.setup-gradle.outputs.gradle-version }}"
  java-version:
    description: "Actual version of the Java environment installed"
    value: "${{ steps.setup-jdk.outputs.version }}"
  java-distribution:
    description: "Distribution of Java that was installed"
    value: "${{ steps.setup-jdk.outputs.distribution }}"
  java-home:
    # yamllint disable-line rule:line-length
    description: "Path to the installed Java environment (equivalent to JAVA_HOME)"
    value: "${{ steps.setup-jdk.outputs.path }}"
  artifact-name:
    # yamllint disable-line rule:line-length
    description: "Name of the uploaded test-report artefact (empty when not uploaded)"
    value: "${{ steps.summary.outputs.artifact_name }}"

runs:
  using: "composite"
  steps:
    - name: "Resolve Java version"
      id: java
      shell: bash
      env:
        JAVA_VERSION: "${{ inputs.java-version }}"
        JDK_VERSION_ALIAS: "${{ inputs.jdk-version }}"
        JAVA_VERSION_FILE: "${{ inputs.java-version-file }}"
      run: |
        # Resolve the effective Java version. A 'java-version-file' takes
        # precedence: setup-java reads the version from the file and the
        # resolved value stays empty (setup-java rejects passing both). The
        # 'jdk-version' input is a deprecated alias retained for backward
        # compatibility; when set it wins over 'java-version' and emits a
        # deprecation warning so existing callers keep working.
        if [ -n "$JDK_VERSION_ALIAS" ]; then
          echo "::warning::'jdk-version' is deprecated; use 'java-version'"
        fi
        if [ -n "$JAVA_VERSION_FILE" ]; then
          version=""
        elif [ -n "$JDK_VERSION_ALIAS" ]; then
          version="$JDK_VERSION_ALIAS"
        else
          version="$JAVA_VERSION"
        fi
        # A version string never spans multiple lines; strip any CR/LF so a
        # crafted value cannot inject extra GITHUB_OUTPUT entries.
        version=$(printf '%s' "$version" | tr -d '\r\n')
        printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
        echo "Resolved Java version: ${version:-(from java-version-file)}"

    - name: "Setup JDK"
      id: setup-jdk
      # yamllint disable-line rule:line-length
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
      with:
        java-version: "${{ steps.java.outputs.version }}"
        java-version-file: "${{ inputs.java-version-file }}"
        distribution: "${{ inputs.distribution }}"
        java-package: "${{ inputs.java-package }}"
        architecture: "${{ inputs.architecture }}"
        check-latest: "${{ inputs.check-latest }}"
        token: "${{ inputs.setup-java-token || github.token }}"

    - name: "Setup Gradle"
      id: setup-gradle
      # yamllint disable-line rule:line-length
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
      with:
        gradle-version: "${{ inputs.gradle-version }}"
        cache-provider: "${{ inputs.cache-provider }}"
        cache-disabled: "${{ inputs.cache-disabled }}"
        cache-read-only: "${{ inputs.cache-read-only }}"
        cache-write-only: "${{ inputs.cache-write-only }}"
        cache-encryption-key: "${{ inputs.cache-encryption-key }}"
        cache-cleanup: "${{ inputs.cache-cleanup }}"
        validate-wrappers: "${{ inputs.validate-wrappers }}"
        add-job-summary: "${{ inputs.add-job-summary }}"
        # yamllint disable-line rule:line-length
        add-job-summary-as-pr-comment: "${{ inputs.add-job-summary-as-pr-comment }}"
        dependency-graph: "${{ inputs.dependency-graph }}"
        build-scan-publish: "${{ inputs.build-scan-publish }}"
        build-scan-terms-of-use-url: "${{ inputs.build-scan-terms-of-use-url }}"
        # yamllint disable-line rule:line-length
        build-scan-terms-of-use-agree: "${{ inputs.build-scan-terms-of-use-agree }}"
        # yamllint disable-line rule:line-length
        develocity-url: "${{ inputs.develocity-url }}"
        develocity-access-key: "${{ inputs.develocity-access-key }}"

    - name: "Run Gradle build"
      id: run-gradle-build
      shell: bash
      working-directory: "${{ inputs.path }}"
      env:
        GRADLE_BUILD_ARGS: "${{ inputs.build-arguments }}"
        GRADLE_VERSION: "${{ inputs.gradle-version }}"
      # Use the Gradle Wrapper when no explicit gradle-version was supplied;
      # otherwise invoke the 'gradle' binary placed on PATH by setup-gradle.
      run: |
        gradle_build_args=()
        if [ -n "$GRADLE_BUILD_ARGS" ]; then
          read -r -a gradle_build_args <<< "$GRADLE_BUILD_ARGS"
        fi
        if [ -n "$GRADLE_VERSION" ]; then
          gradle "${gradle_build_args[@]}"
        else
          ./gradlew "${gradle_build_args[@]}"
        fi

    - name: "Generate build summary and outputs"
      id: summary
      if: always()
      shell: bash
      env:
        JAVA_VERSION: "${{ steps.setup-jdk.outputs.version }}"
        JAVA_DISTRIBUTION: "${{ steps.setup-jdk.outputs.distribution }}"
        GRADLE_VERSION: "${{ steps.setup-gradle.outputs.gradle-version }}"
        BUILD_SCAN_URL: "${{ steps.setup-gradle.outputs.build-scan-url }}"
        BUILD_ARGUMENTS: "${{ inputs.build-arguments }}"
        PROJECT_PATH: "${{ inputs.path }}"
        BUILD_OUTCOME: "${{ steps.run-gradle-build.outcome }}"
        ARTIFACT_UPLOAD: "${{ inputs.artifact-upload }}"
        ARTIFACT_NAME_INPUT: "${{ inputs.artifact-name }}"
        JOB_NAME: "${{ github.job }}"
      run: |
        # Summarise the build and publish action outputs
        set -euo pipefail

        # Sanitise a value for a Markdown table cell: strip CR/LF (which
        # would break rows or inject extra lines) and escape pipe
        # characters (which would create spurious columns).
        md_cell() {
          printf '%s' "$1" | tr -d '\r\n' | sed 's/|/\\|/g'
        }

        artifact_name=""
        if [ "$ARTIFACT_UPLOAD" = "true" ]; then
          # Strip CR/LF from the supplied name first, so a value made up
          # only of CR/LF cannot slip past the non-empty check and yield an
          # empty upload name or inject extra output lines.
          sanitized_name=$(printf '%s' "$ARTIFACT_NAME_INPUT" | tr -d '\r\n')
          if [ -n "$sanitized_name" ]; then
            artifact_name="$sanitized_name"
          else
            artifact_name="gradle-build-${JOB_NAME}"
          fi
        fi
        printf 'artifact_name=%s\n' "$artifact_name" >> "$GITHUB_OUTPUT"

        # The step runs with 'if: always()', so reflect the real build
        # outcome in the header rather than hard-coding success.
        if [ "$BUILD_OUTCOME" = "success" ]; then
          header_icon="✅"
        else
          header_icon="❌"
        fi

        {
          echo "## 🐘 Gradle Build ${header_icon}"
          echo ""
          echo "| Key | Value |"
          echo "|-----|-------|"
          echo "| Result | $(md_cell "$BUILD_OUTCOME") |"
          echo "| JDK version | $(md_cell "$JAVA_VERSION") |"
          echo "| JDK distribution | $(md_cell "$JAVA_DISTRIBUTION") |"
          echo "| Gradle version | $(md_cell "$GRADLE_VERSION") |"
          echo "| Build arguments | $(md_cell "$BUILD_ARGUMENTS") |"
          echo "| Project path | $(md_cell "$PROJECT_PATH") |"
          if [ -n "$BUILD_SCAN_URL" ]; then
            echo "| Build scan | $(md_cell "$BUILD_SCAN_URL") |"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: "Upload test reports"
      if: ${{ always() && inputs.artifact-upload == 'true' }}
      # yamllint disable-line rule:line-length
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: "${{ steps.summary.outputs.artifact_name }}"
        path: |
          ${{ inputs.path }}/**/build/reports/tests/**
          ${{ inputs.path }}/**/build/test-results/**/*.xml
        if-no-files-found: ignore
        retention-days: 7
