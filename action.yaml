# SPDX-FileCopyrightText: 2023 The Linux Foundation

name: "gradle-build"
description: "Set up a specific JDK version and run a Gradle build"

inputs:
  # JDK / toolchain
  jdk-version:
    # yamllint disable-line rule:line-length
    description: "OpenJDK version (ignored when 'java-version-file' is set). Defaults to 21 (LTS) unless 'java-version-file' is supplied"
    required: false
  distribution:
    description: "OpenJDK distribution"
    # yamllint disable-line rule:line-length
    # See: https://github.com/actions/setup-java?tab=readme-ov-file#supported-distributions
    required: false
    default: "temurin"
  java-version-file:
    # yamllint disable-line rule:line-length
    description: "Path to a '.java-version' file (alternative to 'jdk-version')"
    required: false
  java-package:
    description: "JDK package type: 'jdk', 'jre', 'jdk+fx', or 'jre+fx'"
    required: false
    default: "jdk"
  architecture:
    # yamllint disable-line rule:line-length
    description: "Architecture of the JDK package (defaults to the runner's architecture)"
    required: false
  check-latest:
    # yamllint disable-line rule:line-length
    description: "When 'true', resolve the latest version satisfying the version spec"
    required: false
    default: "false"
  setup-java-token:
    # yamllint disable-line rule:line-length
    description: "Token used by setup-java when fetching version manifests (useful on GHES or under rate limits)"
    required: false

  # Project / build configuration
  path:
    description: "Path to the Gradle project (directory containing gradlew)"
    required: false
    default: "."
  build-arguments:
    description: "Arguments to pass to the Gradle Wrapper (default: build)"
    required: false
    default: "build"
  gradle-version:
    # yamllint disable-line rule:line-length
    description: "Gradle version to use. If unset the project's Gradle Wrapper is used"
    required: false

  # Cache configuration (passed through to setup-gradle)
  cache-provider:
    # yamllint disable-line rule:line-length
    description: "Caching implementation: 'enhanced' (default) or 'basic' (MIT)"
    required: false
    default: "enhanced"
  cache-disabled:
    description: "When 'true', all caching is disabled"
    required: false
    default: "false"
  cache-read-only:
    # yamllint disable-line rule:line-length
    description: "When 'true', restore cache entries but do not write new ones"
    required: false
    default: "false"
  cache-write-only:
    # yamllint disable-line rule:line-length
    description: "When 'true', save cache entries but do not restore them"
    required: false
    default: "false"
  cache-encryption-key:
    # yamllint disable-line rule:line-length
    description: "Base64 AES key used to encrypt configuration-cache data"
    required: false
  cache-cleanup:
    # yamllint disable-line rule:line-length
    description: "Gradle User Home cleanup: 'never', 'on-success' (default) or 'always'"
    required: false
    default: "on-success"

  # Wrapper validation
  validate-wrappers:
    # yamllint disable-line rule:line-length
    description: "When 'true' (default) validate checksums of all gradlew jars"
    required: false
    default: "true"

  # Job summaries / PR comments
  add-job-summary:
    # yamllint disable-line rule:line-length
    description: "Emit a Job Summary: 'never', 'always' (default), or 'on-failure'"
    required: false
    default: "always"
  add-job-summary-as-pr-comment:
    # yamllint disable-line rule:line-length
    description: "Post Job Summary as PR comment: 'never' (default), 'always', 'on-failure'"
    required: false
    default: "never"

  # Dependency graph
  dependency-graph:
    # yamllint disable-line rule:line-length
    description: "Dependency snapshot mode: 'disabled' (default), 'generate', 'generate-and-submit', 'generate-submit-and-upload', 'generate-and-upload', 'download-and-submit'"
    required: false
    default: "disabled"

  # Build Scan / Develocity
  build-scan-publish:
    # yamllint disable-line rule:line-length
    description: "Publish results as a Build Scan on scans.gradle.com"
    required: false
    default: "false"
  build-scan-terms-of-use-url:
    description: "Build Scan terms of use URL (required if publishing)"
    required: false
  build-scan-terms-of-use-agree:
    # yamllint disable-line rule:line-length
    description: "Set to 'yes' to agree to the Build Scan terms of use"
    required: false
  develocity-url:
    description: "URL of a Develocity server (enables injection)"
    required: false
  develocity-access-key:
    # yamllint disable-line rule:line-length
    description: "Develocity access key (pass via secrets)"
    required: false

outputs:
  build-scan-url:
    description: "Link to the Build Scan generated by the Gradle build"
    value: "${{ steps.setup-gradle.outputs.build-scan-url }}"
  gradle-version:
    description: "Version of Gradle set up by the action"
    value: "${{ steps.setup-gradle.outputs.gradle-version }}"
  java-version:
    description: "Actual version of the Java environment installed"
    value: "${{ steps.setup-jdk.outputs.version }}"
  java-distribution:
    description: "Distribution of Java that was installed"
    value: "${{ steps.setup-jdk.outputs.distribution }}"
  java-home:
    # yamllint disable-line rule:line-length
    description: "Path to the installed Java environment (equivalent to JAVA_HOME)"
    value: "${{ steps.setup-jdk.outputs.path }}"

runs:
  using: "composite"
  steps:
    - name: "Setup JDK"
      id: setup-jdk
      # yamllint disable-line rule:line-length
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        # Fall back to JDK 21 (current LTS, supported through 2031) only
        # when neither 'jdk-version' nor 'java-version-file' were given.
        # setup-java disallows passing both, so prefer the file when set.
        # yamllint disable-line rule:line-length
        java-version: "${{ inputs.java-version-file == '' && (inputs.jdk-version != '' && inputs.jdk-version || '21') || '' }}"
        java-version-file: "${{ inputs.java-version-file }}"
        distribution: "${{ inputs.distribution }}"
        java-package: "${{ inputs.java-package }}"
        architecture: "${{ inputs.architecture }}"
        check-latest: "${{ inputs.check-latest }}"
        token: "${{ inputs.setup-java-token || github.token }}"

    - name: "Setup Gradle"
      id: setup-gradle
      # yamllint disable-line rule:line-length
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
      with:
        gradle-version: "${{ inputs.gradle-version }}"
        cache-provider: "${{ inputs.cache-provider }}"
        cache-disabled: "${{ inputs.cache-disabled }}"
        cache-read-only: "${{ inputs.cache-read-only }}"
        cache-write-only: "${{ inputs.cache-write-only }}"
        cache-encryption-key: "${{ inputs.cache-encryption-key }}"
        cache-cleanup: "${{ inputs.cache-cleanup }}"
        validate-wrappers: "${{ inputs.validate-wrappers }}"
        add-job-summary: "${{ inputs.add-job-summary }}"
        # yamllint disable-line rule:line-length
        add-job-summary-as-pr-comment: "${{ inputs.add-job-summary-as-pr-comment }}"
        dependency-graph: "${{ inputs.dependency-graph }}"
        build-scan-publish: "${{ inputs.build-scan-publish }}"
        build-scan-terms-of-use-url: "${{ inputs.build-scan-terms-of-use-url }}"
        # yamllint disable-line rule:line-length
        build-scan-terms-of-use-agree: "${{ inputs.build-scan-terms-of-use-agree }}"
        # yamllint disable-line rule:line-length
        develocity-url: "${{ inputs.develocity-url }}"
        develocity-access-key: "${{ inputs.develocity-access-key }}"

    - name: "Run Gradle build"
      id: run-gradle-build
      shell: bash
      working-directory: "${{ inputs.path }}"
      env:
        GRADLE_BUILD_ARGS: "${{ inputs.build-arguments }}"
      # Use the Gradle Wrapper when no explicit gradle-version was supplied;
      # otherwise invoke the 'gradle' binary placed on PATH by setup-gradle.
      run: |
        gradle_build_args=()
        if [ -n "$GRADLE_BUILD_ARGS" ]; then
          read -r -a gradle_build_args <<< "$GRADLE_BUILD_ARGS"
        fi
        if [ -n "${{ inputs.gradle-version }}" ]; then
          gradle "${gradle_build_args[@]}"
        else
          ./gradlew "${gradle_build_args[@]}"
        fi
