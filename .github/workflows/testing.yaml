# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15 # Increase this timeout value as needed
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: "Checkout action repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Check out a real ONAP Gradle project into a sub-directory so the
      # local action can be exercised against a genuine build. The ONAP
      # portal-ng preferences service is a multi-module Spring Boot 3.x
      # project that uses the Gradle Wrapper (Gradle 8.14) and JDK 17.
      - name: "Checkout ONAP Gradle test project (portal-ng-preferences)"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "onap/portal-ng-preferences"
          # Pin to an immutable commit SHA so CI is reproducible and not
          # vulnerable to upstream branch mutations. Update deliberately
          # as needed to pick up new fixture changes.
          ref: "a541c97c9cb9c9d8cca4ea155cc204e0306cdc21"
          path: "test-project"
          persist-credentials: false

      # Perform setup prior to running test(s)
      - name: "Testing setup step"
        shell: bash
        run: |
          # Testing setup step
          echo "Testing setup step"
          echo "### Gradle test project" >> "$GITHUB_STEP_SUMMARY"
          echo "Using ONAP portal-ng-preferences as the build target" \
            >> "$GITHUB_STEP_SUMMARY"
          ls -la test-project

      - name: "Running local action: ${{ github.repository }}"
        uses: ./
        with:
          jdk-version: "17"
          distribution: "temurin"
          path: "test-project"

      - name: "Validated local action: ${{ github.repository }}"
        shell: bash
        env:
          GH_REPOSITORY: "${{ github.repository }}"
        run: |
          # Local action validation
          echo "Validated local action: $GH_REPOSITORY"
          echo "Validation step summary output" >> "$GITHUB_STEP_SUMMARY"

      # Negative test: pass an invalid JDK version so that
      # actions/setup-java fails. This proves the action surfaces
      # setup errors rather than silently swallowing them.
      # yamllint disable-line rule:line-length
      - name: "Running local action: ${{ github.repository }} [Override Failure]"
        uses: ./
        id: failure
        continue-on-error: true
        with:
          jdk-version: "not-a-real-jdk-version"
          path: "test-project"

      # Failure testing is also important
      - name: "Error if step above did NOT fail"
        if: steps.failure.outcome == 'success'
        shell: bash
        run: |
          # Error if step above did NOT fail
          echo "Error: previous test step did NOT fail ❌"
          exit 1
